<!doctype html>
<html>
  <head>
    <title>RelayAI</title>

    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
        background: #f5f7fb;
      }

      .container {
        width: 650px;
        background: white;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        padding: 30px;
      }

      .logo {
        text-align: center;
        font-size: 42px;
        margin-bottom: 5px;
      }

      .logo .relay {
        font-family: cursive;
        font-weight: 900;
      }

      .logo .ai {
        font-weight: bold;
        color: red;
      }

      .desc {
        text-align: center;
        color: #666;
        margin-bottom: 25px;
      }

      .input-area {
        display: flex;
        gap: 10px;
      }

      #prompt {
        flex: 1;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #ddd;
        font-size: 14px;
      }

      button {
        padding: 10px 18px;
        border: none;
        background: #3b82f6;
        color: white;
        border-radius: 6px;
        cursor: pointer;
      }

      button:hover {
        background: #2563eb;
      }

      #output {
        margin-top: 20px;
        border: 1px solid #eee;
        border-radius: 8px;
        padding: 15px;
        height: 250px;
        overflow-y: auto;
        background: #fafafa;
      }

      .message {
        margin-bottom: 12px;
        line-height: 1.5;
      }

      .user {
        color: #2563eb;
        font-weight: 600;
      }

      .llm {
        color: #111;
      }

      .loading {
        font-style: italic;
        color: #888;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="logo">
        <span class="relay">Relay</span><span class="ai">AI</span>
      </div>

      <div class="desc">Generate customized messages for you CRM</div>

      <div class="input-area">
        <input id="prompt" placeholder="Ask something..." />
        <button onclick="generate()">Generate</button>
      </div>

      <div id="output"></div>
    </div>

    <script>
      let ws;
      let client_id = null;
      let ai_message = null;

      const output = document.getElementById("output");

      function connectWS() {
        ws = new WebSocket("ws://localhost:3000/ws");

        ws.onopen = () => {
          console.log("Connected to WS server");
        };

        let aiMessage = null;

        ws.onmessage = (event) => {
          if (event.data.startsWith("CLIENT_ID:")) {
            client_id = event.data.replace("CLIENT_ID:", "");
            console.log(client_id);
            return;
          }

          document.querySelector(".loading")?.remove();

          if (!aiMessage) {
            aiMessage = document.createElement("p");
            aiMessage.className = "llm";
            output.appendChild(aiMessage);
          }

          aiMessage.textContent += event.data;
        };
      }

      connectWS();

      async function generate() {
        if (!client_id) {
          console.log("Waiting for client id");
          return;
        }

        const prompt = document.getElementById("prompt").value.trim();
        if (!prompt) return;

        document.getElementById("prompt").value = "";

        const user = document.createElement("div");
        user.className = "message user";
        user.textContent = prompt;

        output.appendChild(user);

        const loading = document.createElement("div");
        loading.className = "message loading";
        loading.textContent = "AI is thinking...";

        output.appendChild(loading);

        output.scrollTop = output.scrollHeight;

        await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            prompt: prompt,
            client_id: client_id,
          }),
        });
      }
    </script>
  </body>
</html>
